<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Task Dashboard{% endblock %}</title>
  <style>
    :root {
      --bg: #f4efe7;
      --surface: #fffaf2;
      --panel: #fdf6ea;
      --text: #26211b;
      --muted: #6f6558;
      --accent: #007a6e;
      --accent-soft: #d7f2ee;
      --danger: #bc3f2f;
      --border: #e3d8c8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #fff7ec 0%, var(--bg) 55%),
                  linear-gradient(135deg, #f9f0e0 0%, #ece2d5 100%);
      min-height: 100vh;
    }

    .shell {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(38, 33, 27, 0.08);
      padding: 18px;
    }

    h1, h2, h3 {
      margin-top: 0;
      letter-spacing: 0.2px;
    }

    .muted { color: var(--muted); }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 900px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    textarea { min-height: 80px; resize: vertical; }

    button {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #00695f;
    }

    button.secondary {
      background: var(--accent-soft);
      color: #094741;
      border-color: #9ad9d1;
    }

    button.danger {
      background: var(--danger);
      border-color: #8a2e23;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .task-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: var(--panel);
      margin-bottom: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f2eadf;
      font-size: 12px;
      border: 1px solid var(--border);
    }

    .error {
      background: #ffe7df;
      border: 1px solid #f1b8aa;
      border-radius: 10px;
      padding: 10px;
      color: #6e2318;
      margin-bottom: 10px;
    }
    .tasks-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
}

.tasks-table th,
.tasks-table td {
  border: 1px solid #ddd;
  padding: 12px;
  text-align: left;
  vertical-align: top;
}

.tasks-table th {
  background-color: #f2f2f2;
  font-weight: bold;
}

.tasks-table tr:nth-child(even) {
  background-color: #f9f9f9;
}

.update-form input,
.update-form textarea,
.update-form select {
  width: 100%;
  margin-bottom: 8px;
  padding: 6px;
}

.update-form button,
.task-delete button {
  margin-top: 8px;
}

.danger {
  background-color: #dc3545;
  color: white;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  background-color: #6c757d;
  color: white;
  font-size: 0.9em;
}

.muted {
  color: #6c757d;
}
  </style>
</head>
<body>
  <div class="shell">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
